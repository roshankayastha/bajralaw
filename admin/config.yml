backend:
  name: github
  repo: roshankayastha/bajralaw
  branch: master
  base_url: https://sveltia-cms-auth.roshankayastha8.workers.dev

local_backend: true

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "content"
    label: "Website Content"
    delete: false
    files:
      - name: "articles"
        label: "Publications"
        file: "assets/articles.json"
        format: "json"
        fields:
          - name: "articles"
            label: "Articles"
            label_singular: "Article"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Publish Date", name: "date", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Image URL", name: "image", widget: "string" }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "Content", name: "content", widget: "markdown" }
      - name: "team"
        label: "Meet Our Team"
        file: "assets/team.json"
        format: "json"
        fields:
          - name: "members"
            label: "Team Members"
            label_singular: "Team Member"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Role / Title", name: "role", widget: "string" }
              - { label: "Photo URL", name: "image", widget: "image" }
              - { label: "Short Bio", name: "bio", widget: "text" }
              - { label: "Contact Email", name: "email", widget: "string" }
      - name: "settings"
        label: "Global Settings & Contacts"
        file: "assets/settings.json"
        format: "json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Phone Link (tel:)", name: "phone_href", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Office Location Address", name: "address", widget: "text" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "Homepage Promise Quote", name: "promise_quote", widget: "text" }
      - name: "homepage"
        label: "Homepage Slider Banners"
        file: "assets/homepage.json"
        format: "json"
        fields:
          - name: "slides"
            label: "Hero Slides"
            label_singular: "Hero Slide"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Image Background", name: "image", widget: "image" }
              - { label: "Slide Title (HTML supported)", name: "title", widget: "string" }
              - { label: "Slide Subtitle / Description", name: "subtitle", widget: "text" }
              - { label: "Button Label", name: "button_text", widget: "string" }
              - { label: "Button Destination Link", name: "button_link", widget: "string" }
